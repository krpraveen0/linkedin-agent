name: aep-evening-review

on:
  schedule:
    # 20:00 UTC daily (timezone assumption: UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:
  push:
    branches: [main]  # never auto-dispatch from a feature/PR branch push —
                       # see aep-morning-research.yml's incident note
    paths:
      - 'aep/**'
      - '.github/workflows/aep-evening-review.yml'

concurrency:
  group: aep-evening-review
  cancel-in-progress: false

jobs:
  evening-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install AEP pipeline dependencies
        run: pip install -r aep/requirements.txt

      - name: Run AEP evening orchestrator
        run: |
          bash aep/pipelines/evening-orchestrator.sh

      - name: Upload evening pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aep-evening-pipeline
          path: aep/out/evening/**
