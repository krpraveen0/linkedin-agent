name: aep-constitution-check

on:
  pull_request:
    paths:
      - 'aep/**'
      - '.github/workflows/aep-constitution-check.yml'
  push:
    paths:
      - 'aep/**'
      - '.github/workflows/aep-constitution-check.yml'
  workflow_dispatch:

jobs:
  constitution-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AEP files include human approval state
        run: |
          grep -R -nE "Draft - Pending Human Approval|Human approval" aep >/dev/null

      - name: Block external LLM API/provider usage in AEP
        run: |
          # Targets actual SDK/API integration (imports, api-key env vars, api.* hosts),
          # not editorial mentions of provider names/domains as citation references
          # (e.g. research bundles legitimately cite https://anthropic.com/news/... as
          # an official source — that is not an API call).
          if grep -R -nE \
            "(^|[^a-zA-Z0-9_.-])(import|from) +(openai|anthropic|groq|cohere|mistralai)\b|from google import genai|import google\.generativeai|OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_AI_KEY|GEMINI_API_KEY|GROQ_API_KEY|MISTRAL_API_KEY|COHERE_API_KEY|XAI_API_KEY|api\.openai\.com|api\.anthropic\.com|generativelanguage\.googleapis\.com|api\.groq\.com|api\.mistral\.ai|api\.cohere\.ai" \
            aep \
            --include='*.sh' --include='*.py' --include='*.js' --include='*.ts' --include='*.json' --include='*.yml' --include='*.yaml'; then
            echo "Disallowed external LLM provider/API usage detected in aep/**"
            exit 1
          fi

      - name: Validate all AEP JSON files parse
        run: |
          python - <<'PY'
          import glob, json
          for path in glob.glob('aep/**/*.json', recursive=True):
              with open(path, 'r', encoding='utf-8') as f:
                  json.load(f)
              print(f'validated: {path}')
          PY
