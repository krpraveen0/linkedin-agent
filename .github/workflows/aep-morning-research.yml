name: aep-morning-research

on:
  schedule:
    # 06:00 UTC daily (timezone assumption: UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]  # never auto-dispatch from a feature/PR branch push — see
                       # the incident note below: this used to fire on any
                       # branch, which raced two concurrent triggers into
                       # creating duplicate real GitHub issues and assigning
                       # Copilot to both from a non-main branch during review.
    paths:
      - 'aep/**'
      - '.github/workflows/aep-morning-research.yml'

concurrency:
  group: aep-morning-research
  cancel-in-progress: false  # let an in-flight dispatch finish rather than
                              # racing a second trigger past the idempotency
                              # check before the first has created its issue

jobs:
  morning-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install AEP pipeline dependencies
        run: pip install -r aep/requirements.txt

      - name: Run AEP morning orchestrator
        run: |
          bash aep/pipelines/morning-orchestrator.sh

      - name: Dispatch top-ranked topic (Copilot, falling back to Claude Code)
        env:
          COPILOT_DISPATCH_PAT: ${{ secrets.COPILOT_DISPATCH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$COPILOT_DISPATCH_PAT" ]; then
            echo "COPILOT_DISPATCH_PAT not set — skipping dispatch."
            echo "Deterministic artifacts were still generated and uploaded below."
            echo "See aep/docs/agent-dispatch.md to enable auto-dispatch."
            exit 0
          fi
          python3 aep/pipelines/dispatch_to_agent.py --mode morning

      - name: Upload morning pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aep-morning-pipeline
          path: aep/out/morning/**
