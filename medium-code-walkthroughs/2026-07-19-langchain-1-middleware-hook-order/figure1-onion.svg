<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="30" font-size="16" fill="#333333" text-anchor="middle" font-weight="bold">Middleware nesting: first in the list is the outermost layer</text>

  <!-- OUTER layer -->
  <rect x="70" y="60" width="500" height="230" rx="10" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="90" y="82" font-size="13" fill="#333333" font-weight="bold">OUTER middleware</text>

  <!-- INNER layer -->
  <rect x="130" y="100" width="380" height="150" rx="10" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="150" y="122" font-size="13" fill="#333333" font-weight="bold">INNER middleware</text>

  <!-- MODEL core -->
  <rect x="250" y="150" width="140" height="60" rx="8" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="320" y="185" font-size="13" fill="#333333" text-anchor="middle" font-weight="bold">model call</text>

  <!-- enter arrow (top) -->
  <text x="90" y="315" font-size="12" fill="#333333">Enter (before_*, wrap&gt;):</text>
  <text x="235" y="315" font-size="12" fill="#333333" font-weight="bold">OUTER &#8594; INNER &#8594; model</text>

  <!-- exit arrow (bottom) -->
  <text x="90" y="338" font-size="12" fill="#333333">Return (wrap&lt;, after_*):</text>
  <text x="235" y="338" font-size="12" fill="#333333" font-weight="bold">model &#8594; INNER &#8594; OUTER</text>

  <!-- directional arrows inside -->
  <line x1="90" y1="145" x2="240" y2="180" stroke="#333333" stroke-width="1.2" marker-end="url(#ah)"/>
  <line x1="400" y1="180" x2="548" y2="145" stroke="#333333" stroke-width="1.2" marker-end="url(#ah)"/>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
</svg>
