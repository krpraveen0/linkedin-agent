<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
  <text x="320" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">Routing is decided by message type, not by the edge</text>

  <!-- Classifier -->
  <rect x="40" y="150" width="150" height="60" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="115" y="178" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">Classifier</text>
  <text x="115" y="197" font-size="12" text-anchor="middle" fill="#333333">emits Refund | Question</text>

  <!-- RefundDesk -->
  <rect x="420" y="70" width="180" height="70" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="510" y="98" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">RefundDesk</text>
  <text x="510" y="117" font-size="12" text-anchor="middle" fill="#333333">handles Refund</text>
  <text x="510" y="133" font-size="12" text-anchor="middle" fill="#333333">handles Question</text>

  <!-- FAQ -->
  <rect x="420" y="220" width="180" height="70" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="510" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">FAQ</text>
  <text x="510" y="269" font-size="12" text-anchor="middle" fill="#333333">handles Question only</text>

  <!-- Edge to RefundDesk (solid) -->
  <line x1="190" y1="170" x2="415" y2="105" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Edge to FAQ (solid) -->
  <line x1="190" y1="190" x2="415" y2="255" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="290" y="120" font-size="11" text-anchor="middle" fill="#333333">edge</text>
  <text x="290" y="245" font-size="11" text-anchor="middle" fill="#333333">edge</text>

  <!-- Delivery legend -->
  <text x="115" y="250" font-size="12" text-anchor="middle" fill="#333333">Refund  &#8594; RefundDesk only</text>
  <text x="115" y="270" font-size="12" text-anchor="middle" fill="#333333">Question &#8594; both nodes</text>

  <text x="320" y="330" font-size="12" font-style="italic" text-anchor="middle" fill="#333333">A Refund is never delivered to FAQ: FAQ has no handler for its type.</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
</svg>
