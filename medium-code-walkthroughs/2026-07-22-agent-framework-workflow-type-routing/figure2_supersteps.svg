<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">Pregel supersteps: fan-out runs together, fan-in waits for the barrier</text>

  <!-- Superstep 1 container -->
  <rect x="40" y="60" width="250" height="230" rx="6" fill="#f7f7f7" stroke="#333333" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="165" y="82" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">superstep 1</text>

  <rect x="70" y="110" width="90" height="55" rx="6" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="115" y="142" font-size="13" text-anchor="middle" fill="#333333">fraud</text>

  <rect x="170" y="110" width="90" height="55" rx="6" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="215" y="142" font-size="13" text-anchor="middle" fill="#333333">stock</text>

  <text x="165" y="215" font-size="12" text-anchor="middle" fill="#333333">both run concurrently</text>
  <text x="165" y="233" font-size="12" text-anchor="middle" fill="#333333">in the same superstep</text>

  <!-- Barrier -->
  <line x1="320" y1="55" x2="320" y2="295" stroke="#333333" stroke-width="2"/>
  <text x="320" y="315" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">barrier</text>

  <!-- Superstep 2 container -->
  <rect x="350" y="60" width="250" height="230" rx="6" fill="#f7f7f7" stroke="#333333" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="475" y="82" font-size="14" font-weight="bold" text-anchor="middle" fill="#333333">superstep 2</text>

  <rect x="420" y="110" width="110" height="55" rx="6" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="475" y="142" font-size="13" text-anchor="middle" fill="#333333">approve</text>

  <text x="475" y="215" font-size="12" text-anchor="middle" fill="#333333">runs once, after both</text>
  <text x="475" y="233" font-size="12" text-anchor="middle" fill="#333333">inputs are collected as a list</text>

  <!-- arrows across barrier -->
  <line x1="160" y1="137" x2="320" y2="137" stroke="#333333" stroke-width="1.2" marker-end="url(#a2)"/>
  <line x1="260" y1="137" x2="320" y2="137" stroke="#333333" stroke-width="1.2"/>
  <line x1="320" y1="137" x2="418" y2="137" stroke="#333333" stroke-width="1.2" marker-end="url(#a2)"/>

  <text x="320" y="355" font-size="12" font-style="italic" text-anchor="middle" fill="#333333">The fan-in node cannot run until the superstep barrier closes.</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
</svg>
