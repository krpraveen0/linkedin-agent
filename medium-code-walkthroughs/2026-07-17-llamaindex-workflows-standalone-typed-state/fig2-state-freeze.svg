<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="260" fill="#ffffff"/>
  <defs>
    <marker id="arw2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
  <text x="360" y="28" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle">Typed state freezes to JSON and rebuilds without rerunning</text>

  <!-- run / Context -->
  <rect x="30" y="80" width="150" height="90" rx="6" fill="#f0f0f0" stroke="#333333"/>
  <text x="105" y="108" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Context[TriageState]</text>
  <text x="105" y="130" font-size="11" fill="#333333" text-anchor="middle">attempts = 2</text>
  <text x="105" y="147" font-size="11" fill="#333333" text-anchor="middle">decisions =</text>
  <text x="105" y="162" font-size="11" fill="#333333" text-anchor="middle">['escalate']</text>

  <!-- JSON blob -->
  <rect x="285" y="80" width="150" height="90" rx="6" fill="#e0e0e0" stroke="#333333"/>
  <text x="360" y="112" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">JSON</text>
  <text x="360" y="134" font-size="11" fill="#333333" text-anchor="middle">737 bytes</text>
  <text x="360" y="151" font-size="11" fill="#333333" text-anchor="middle">on disk / in a queue</text>

  <!-- restored Context -->
  <rect x="540" y="80" width="150" height="90" rx="6" fill="#f0f0f0" stroke="#333333"/>
  <text x="615" y="108" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">restored Context</text>
  <text x="615" y="130" font-size="11" fill="#333333" text-anchor="middle">attempts = 2</text>
  <text x="615" y="147" font-size="11" fill="#333333" text-anchor="middle">decisions =</text>
  <text x="615" y="162" font-size="11" fill="#333333" text-anchor="middle">['escalate']</text>

  <!-- arrows -->
  <line x1="180" y1="125" x2="281" y2="125" stroke="#333333" stroke-width="1.5" marker-end="url(#arw2)"/>
  <text x="230" y="116" font-size="12" fill="#333333" text-anchor="middle">to_dict()</text>
  <line x1="435" y1="125" x2="536" y2="125" stroke="#333333" stroke-width="1.5" marker-end="url(#arw2)"/>
  <text x="485" y="116" font-size="12" fill="#333333" text-anchor="middle">from_dict()</text>

  <text x="360" y="212" font-size="12" fill="#333333" text-anchor="middle">No steps rerun. Validated on the way back in because the state is a Pydantic model.</text>
  <text x="360" y="232" font-size="11" fill="#333333" text-anchor="middle">This round trip is the primitive under human-in-the-loop pauses and crash recovery.</text>
</svg>
