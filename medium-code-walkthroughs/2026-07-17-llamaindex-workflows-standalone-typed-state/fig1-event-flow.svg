<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="300" fill="#ffffff"/>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
  <text x="360" y="26" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle">Triage workflow: events route the control flow</text>

  <!-- StartEvent -->
  <rect x="24" y="120" width="120" height="44" rx="6" fill="#e0e0e0" stroke="#333333"/>
  <text x="84" y="147" font-size="13" fill="#333333" text-anchor="middle">StartEvent</text>

  <!-- score step -->
  <rect x="200" y="118" width="120" height="48" rx="6" fill="#f0f0f0" stroke="#333333"/>
  <text x="260" y="139" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">score</text>
  <text x="260" y="156" font-size="11" fill="#333333" text-anchor="middle">attempts += 1</text>

  <!-- retry step (loop) -->
  <rect x="200" y="34" width="120" height="44" rx="6" fill="#f0f0f0" stroke="#333333"/>
  <text x="260" y="55" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">retry</text>
  <text x="260" y="71" font-size="11" fill="#333333" text-anchor="middle">RetryEvent</text>

  <!-- route step -->
  <rect x="392" y="118" width="120" height="48" rx="6" fill="#f0f0f0" stroke="#333333"/>
  <text x="452" y="139" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">route</text>
  <text x="452" y="156" font-size="11" fill="#333333" text-anchor="middle">ScoredEvent</text>

  <!-- StopEvent -->
  <rect x="576" y="120" width="120" height="44" rx="6" fill="#e0e0e0" stroke="#333333"/>
  <text x="636" y="141" font-size="13" fill="#333333" text-anchor="middle">StopEvent</text>
  <text x="636" y="157" font-size="11" fill="#333333" text-anchor="middle">verdict</text>

  <!-- edges -->
  <line x1="144" y1="142" x2="196" y2="142" stroke="#333333" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- score -> retry (attempt<2) -->
  <path d="M245,118 L245,80" fill="none" stroke="#333333" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="150" y="100" font-size="11" fill="#333333">attempt &lt; 2</text>
  <!-- retry -> back to StartEvent/score -->
  <path d="M275,78 L275,116" fill="none" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arw)"/>
  <text x="288" y="100" font-size="11" fill="#333333">loop</text>
  <!-- score -> route -->
  <line x1="320" y1="142" x2="388" y2="142" stroke="#333333" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="330" y="134" font-size="11" fill="#333333">score set</text>
  <!-- route -> stop -->
  <line x1="512" y1="142" x2="572" y2="142" stroke="#333333" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- stream lane -->
  <rect x="200" y="212" width="312" height="40" rx="6" fill="#ffffff" stroke="#333333" stroke-dasharray="4,3"/>
  <text x="356" y="230" font-size="12" font-weight="bold" fill="#333333" text-anchor="middle">ctx.write_event_to_stream(ProgressEvent)</text>
  <text x="356" y="246" font-size="11" fill="#333333" text-anchor="middle">streamed to the caller, consumed by no step</text>
  <path d="M260,166 L300,210" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="2,3" marker-end="url(#arw)"/>
  <path d="M452,166 L412,210" fill="none" stroke="#333333" stroke-width="1" stroke-dasharray="2,3" marker-end="url(#arw)"/>
</svg>
