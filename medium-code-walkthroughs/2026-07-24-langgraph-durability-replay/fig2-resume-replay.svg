<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="340" fill="#ffffff"/>
  <text x="20" y="30" font-size="17" font-weight="bold" fill="#333333">Resume re-runs the whole failed node</text>
  <text x="20" y="52" font-size="13" fill="#333333">Checkpoints sit at superstep boundaries, so a crash inside node C has no partial-progress record.</text>

  <!-- FIRST RUN -->
  <text x="20" y="90" font-size="14" font-weight="bold" fill="#333333">First run</text>
  <rect x="120" y="72" width="110" height="34" fill="#f0f0f0" stroke="#333333"/>
  <text x="175" y="94" font-size="13" fill="#333333" text-anchor="middle">A ran</text>
  <rect x="270" y="72" width="110" height="34" fill="#f0f0f0" stroke="#333333"/>
  <text x="325" y="94" font-size="13" fill="#333333" text-anchor="middle">B ran</text>
  <rect x="420" y="72" width="150" height="34" fill="#e0e0e0" stroke="#333333" stroke-dasharray="5 3"/>
  <text x="495" y="94" font-size="13" fill="#333333" text-anchor="middle">C ran, then crashed</text>
  <line x1="230" y1="89" x2="268" y2="89" stroke="#333333" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="380" y1="89" x2="418" y2="89" stroke="#333333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="585" y="85" font-size="20" fill="#333333">&#10005;</text>

  <!-- checkpoint markers -->
  <circle cx="250" cy="128" r="7" fill="#333333"/>
  <text x="262" y="132" font-size="11" fill="#333333">checkpoint (A done)</text>
  <circle cx="400" cy="128" r="7" fill="#333333"/>
  <text x="412" y="132" font-size="11" fill="#333333">checkpoint (B done) &#8592; latest saved state</text>

  <line x1="60" y1="160" x2="660" y2="160" stroke="#e0e0e0" stroke-width="1"/>

  <!-- RESUME -->
  <text x="20" y="196" font-size="14" font-weight="bold" fill="#333333">Resume</text>
  <rect x="120" y="178" width="110" height="34" fill="#ffffff" stroke="#333333" stroke-dasharray="4 3"/>
  <text x="175" y="200" font-size="13" fill="#333333" text-anchor="middle">A skipped</text>
  <rect x="270" y="178" width="110" height="34" fill="#ffffff" stroke="#333333" stroke-dasharray="4 3"/>
  <text x="325" y="200" font-size="13" fill="#333333" text-anchor="middle">B skipped</text>
  <rect x="420" y="178" width="150" height="34" fill="#f0f0f0" stroke="#333333"/>
  <text x="495" y="200" font-size="13" fill="#333333" text-anchor="middle">C runs again (2nd time)</text>
  <line x1="380" y1="195" x2="418" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="120" y="240" font-size="12" fill="#333333">A and B are restored from the checkpoint, not executed.</text>
  <text x="120" y="258" font-size="12" fill="#333333">C starts over from its first line, so any side effect it did before crashing repeats.</text>

  <rect x="120" y="280" width="450" height="40" fill="#f0f0f0" stroke="#333333"/>
  <text x="132" y="305" font-size="12" fill="#333333" font-style="italic">Observed: total node executions = A:1, B:1, C:2. Idempotency is on you.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
</svg>
