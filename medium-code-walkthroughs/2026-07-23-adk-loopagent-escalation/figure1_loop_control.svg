<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <text x="320" y="28" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">How a LoopAgent decides to continue or stop</text>

  <!-- Start -->
  <rect x="250" y="52" width="140" height="34" rx="17" fill="#e0e0e0" stroke="#333333"/>
  <text x="320" y="74" font-size="13" fill="#333333" text-anchor="middle">enter loop iteration</text>

  <!-- max_iterations check -->
  <polygon points="320,102 430,142 320,182 210,142" fill="#f0f0f0" stroke="#333333"/>
  <text x="320" y="138" font-size="12" fill="#333333" text-anchor="middle">times_looped &lt;</text>
  <text x="320" y="154" font-size="12" fill="#333333" text-anchor="middle">max_iterations ?</text>

  <!-- run sub-agents -->
  <rect x="240" y="200" width="160" height="40" rx="4" fill="#ffffff" stroke="#333333"/>
  <text x="320" y="218" font-size="12" fill="#333333" text-anchor="middle">run each sub-agent;</text>
  <text x="320" y="234" font-size="12" fill="#333333" text-anchor="middle">yield its events</text>

  <!-- escalate check -->
  <polygon points="320,258 440,300 320,342 200,300" fill="#f0f0f0" stroke="#333333"/>
  <text x="320" y="296" font-size="12" fill="#333333" text-anchor="middle">any event with</text>
  <text x="320" y="312" font-size="12" fill="#333333" text-anchor="middle">actions.escalate ?</text>

  <!-- STOP box (max reached) -->
  <rect x="470" y="122" width="150" height="40" rx="4" fill="#e0e0e0" stroke="#333333"/>
  <text x="545" y="140" font-size="12" fill="#333333" text-anchor="middle">STOP</text>
  <text x="545" y="156" font-size="11" fill="#333333" text-anchor="middle">(hit max_iterations)</text>

  <!-- STOP box (escalate) -->
  <rect x="470" y="280" width="150" height="40" rx="4" fill="#e0e0e0" stroke="#333333"/>
  <text x="545" y="298" font-size="12" fill="#333333" text-anchor="middle">STOP</text>
  <text x="545" y="314" font-size="11" fill="#333333" text-anchor="middle">(escalate=True)</text>

  <!-- arrows -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>
  <line x1="320" y1="86" x2="320" y2="100" stroke="#333333" marker-end="url(#a)"/>
  <line x1="320" y1="182" x2="320" y2="198" stroke="#333333" marker-end="url(#a)"/>
  <text x="332" y="196" font-size="11" fill="#333333">yes</text>
  <line x1="320" y1="240" x2="320" y2="256" stroke="#333333" marker-end="url(#a)"/>

  <!-- max no -> stop -->
  <line x1="430" y1="142" x2="468" y2="142" stroke="#333333" marker-end="url(#a)"/>
  <text x="436" y="134" font-size="11" fill="#333333">no</text>

  <!-- escalate yes -> stop -->
  <line x1="440" y1="300" x2="468" y2="300" stroke="#333333" marker-end="url(#a)"/>
  <text x="446" y="292" font-size="11" fill="#333333">yes</text>

  <!-- escalate no -> back to top (loop) -->
  <line x1="200" y1="300" x2="120" y2="300" stroke="#333333"/>
  <line x1="120" y1="300" x2="120" y2="142" stroke="#333333"/>
  <line x1="120" y1="142" x2="208" y2="142" stroke="#333333" marker-end="url(#a)"/>
  <text x="126" y="224" font-size="11" fill="#333333">no: loop again</text>
</svg>
