<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>
  <text x="380" y="30" font-size="17" font-weight="bold" fill="#333333" text-anchor="middle">What the AgentCardSignature signs</text>

  <!-- payload -->
  <rect x="30" y="60" width="300" height="150" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="180" y="86" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Agent Card (payload)</text>
  <text x="180" y="110" font-size="12" fill="#333333" text-anchor="middle">canonical JSON, keys sorted,</text>
  <text x="180" y="128" font-size="12" fill="#333333" text-anchor="middle">empty fields removed</text>
  <rect x="55" y="146" width="250" height="46" rx="4" fill="#ffffff" stroke="#333333" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="180" y="166" font-size="12" fill="#333333" text-anchor="middle">signatures field is</text>
  <text x="180" y="183" font-size="12" fill="#333333" text-anchor="middle">excluded from signing</text>

  <!-- signing input -->
  <rect x="30" y="250" width="470" height="60" rx="6" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="265" y="275" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">signing input</text>
  <text x="265" y="296" font-size="12.5" fill="#333333" text-anchor="middle">base64url(protected) + "." + base64url(payload)</text>

  <line x1="180" y1="210" x2="180" y2="248" stroke="#333333" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- signature fields -->
  <rect x="430" y="60" width="300" height="150" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="580" y="86" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">AgentCardSignature (JWS)</text>
  <text x="450" y="116" font-size="12.5" fill="#333333">protected: b64url JOSE header</text>
  <text x="468" y="134" font-size="11.5" fill="#333333" font-style="italic">alg, kid, typ="JOSE", jku</text>
  <text x="450" y="160" font-size="12.5" fill="#333333">signature: b64url signature</text>
  <text x="450" y="186" font-size="12.5" fill="#333333">header: optional, unprotected</text>

  <!-- sign op -->
  <rect x="540" y="250" width="190" height="60" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="635" y="275" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">EdDSA / ES256</text>
  <text x="635" y="296" font-size="12" fill="#333333" text-anchor="middle">private key &#8594; signature</text>

  <line x1="500" y1="280" x2="538" y2="280" stroke="#333333" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="635" y1="250" x2="635" y2="212" stroke="#333333" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="700" y="238" font-size="11" fill="#333333" text-anchor="middle">fills</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#333333"/>
    </marker>
  </defs>
</svg>
