<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="30" font-size="17" font-weight="bold" fill="#333333" text-anchor="middle">Signing and verifying an A2A Agent Card</text>

  <!-- Issuer -->
  <rect x="30" y="70" width="180" height="90" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="120" y="100" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Issuer (agent owner)</text>
  <text x="120" y="122" font-size="12" fill="#333333" text-anchor="middle">holds private key</text>
  <text x="120" y="140" font-size="12" fill="#333333" text-anchor="middle">signs the card (JWS)</text>

  <!-- Signed card -->
  <rect x="290" y="60" width="190" height="110" rx="6" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="385" y="88" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Signed Agent Card</text>
  <text x="385" y="108" font-size="12" fill="#333333" text-anchor="middle">name, version, skills,</text>
  <text x="385" y="126" font-size="12" fill="#333333" text-anchor="middle">interface url ...</text>
  <text x="385" y="150" font-size="12" fill="#333333" text-anchor="middle" font-style="italic">signatures: [ JWS ]</text>

  <!-- Consumer -->
  <rect x="560" y="70" width="180" height="90" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="650" y="100" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Consumer agent</text>
  <text x="650" y="122" font-size="12" fill="#333333" text-anchor="middle">re-computes payload</text>
  <text x="650" y="140" font-size="12" fill="#333333" text-anchor="middle">verifies signature</text>

  <!-- arrows top row -->
  <line x1="210" y1="115" x2="288" y2="115" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="249" y="107" font-size="11" fill="#333333" text-anchor="middle">sign</text>
  <line x1="480" y1="115" x2="558" y2="115" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="519" y="107" font-size="11" fill="#333333" text-anchor="middle">fetch</text>

  <!-- JWKS key store -->
  <rect x="510" y="250" width="230" height="80" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="625" y="278" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">JWKS (public keys)</text>
  <text x="625" y="300" font-size="12" fill="#333333" text-anchor="middle">looked up by kid / jku</text>
  <text x="625" y="318" font-size="12" fill="#333333" text-anchor="middle">over HTTPS or trust store</text>

  <line x1="650" y1="160" x2="650" y2="248" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="208" font-size="11" fill="#333333" text-anchor="middle">get key</text>

  <!-- verdicts -->
  <rect x="40" y="250" width="200" height="36" rx="4" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="140" y="273" font-size="12.5" fill="#333333" text-anchor="middle">match &#8594; accept card</text>
  <rect x="40" y="296" width="200" height="36" rx="4" fill="#ffffff" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="140" y="319" font-size="12.5" fill="#333333" text-anchor="middle">any edit &#8594; reject card</text>
  <line x1="560" y1="150" x2="242" y2="270" stroke="#333333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#333333"/>
    </marker>
  </defs>
</svg>
