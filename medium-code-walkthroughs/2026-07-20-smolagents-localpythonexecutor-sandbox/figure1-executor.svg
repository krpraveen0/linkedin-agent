<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="380" fill="#ffffff"/>
  <!-- Your process boundary -->
  <rect x="20" y="20" width="600" height="340" fill="#f7f7f7" stroke="#333333" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="30" y="42" font-size="13" fill="#333333" font-style="italic">Your agent process (no OS-level isolation)</text>

  <!-- LLM box -->
  <rect x="50" y="70" width="180" height="60" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="140" y="95" font-size="14" fill="#333333" text-anchor="middle">LLM writes Python</text>
  <text x="140" y="115" font-size="12" fill="#333333" text-anchor="middle">(the "action")</text>

  <!-- arrow -->
  <line x1="230" y1="100" x2="300" y2="100" stroke="#333333" stroke-width="1.5"/>
  <polygon points="300,100 290,95 290,105" fill="#333333"/>

  <!-- AST interpreter box -->
  <rect x="300" y="60" width="290" height="220" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="445" y="85" font-size="14" fill="#333333" text-anchor="middle" font-weight="bold">LocalPythonExecutor</text>
  <text x="445" y="103" font-size="12" fill="#333333" text-anchor="middle">walks the AST, node by node</text>

  <!-- checks -->
  <rect x="320" y="120" width="250" height="30" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <text x="330" y="140" font-size="12" fill="#333333">import on allowlist?  else BLOCK</text>
  <rect x="320" y="158" width="250" height="30" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <text x="330" y="178" font-size="12" fill="#333333">dunder attribute (__class__)?  BLOCK</text>
  <rect x="320" y="196" width="250" height="30" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <text x="330" y="216" font-size="12" fill="#333333">eval / exec / compile?  BLOCK</text>
  <rect x="320" y="234" width="250" height="30" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <text x="330" y="254" font-size="12" fill="#333333">loop over 1,000,000 iters?  BLOCK</text>

  <!-- arrow down to OS -->
  <line x1="445" y1="280" x2="445" y2="320" stroke="#333333" stroke-width="1.5"/>
  <polygon points="445,320 440,310 450,310" fill="#333333"/>

  <!-- OS box -->
  <rect x="300" y="320" width="290" height="30" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="445" y="340" font-size="12" fill="#333333" text-anchor="middle">Same Python runtime, same OS, same files</text>
</svg>
